<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Etsy688 Local</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f4f4f5;color:#1f2937;font-size:14px}
a{color:#2563eb;text-decoration:none}
header{background:#fff;border-bottom:1px solid #e5e7eb;padding:12px 0;margin-bottom:20px}
.max-w{max-width:1100px;margin:0 auto;padding:0 16px}
.flex{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.nav{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.nbtn{display:inline-flex;align-items:center;gap:5px;padding:7px 12px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:500;transition:all .15s}
.nbtn.on{background:#2563eb;color:#fff}
.nbtn.off{background:#f3f4f6;color:#374151}
.nbtn.r{margin-left:auto;background:0;color:#6b7280;font-size:16px}
.nbtn.r:hover{color:#2563eb}
.card{background:#fff;border-radius:12px;border:1px solid #e5e7eb;padding:20px;margin-bottom:16px}
.sec{display:none}.sec.on{display:block}
.ugrid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.zone{border:2px dashed #d1d5db;border-radius:12px;padding:16px;text-align:center;cursor:pointer;min-height:90px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;font-size:12px;color:#6b7280;transition:all .2s}
.zone:hover{border-color:#60a5fa;background:#eff6ff}
.zone.succ{border-color:#34d399;background:#ecfdf5}
.lbl{font-size:12px;font-weight:600;color:#374151;margin-bottom:8px;display:block}
.rg{display:flex;flex-wrap:wrap;gap:6px}
.rb{padding:5px 12px;border:1px solid #e5e7eb;border-radius:8px;cursor:pointer;font-size:12px;transition:all .15s}
.rb.on{border-color:#2563eb;background:#eff6ff;color:#2563eb;font-weight:600}
.ta{width:100%;border:1px solid #d1d5db;border-radius:8px;padding:8px 12px;font-size:13px;outline:none}
.ta:focus{border-color:#60a5fa}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:10px 20px;border-radius:10px;border:none;cursor:pointer;font-size:14px;font-weight:600;gap:6px}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-p{background:#2563eb;color:#fff;width:100%}
.btn-p:not(:disabled):hover{background:#1d4ed8}
.btn-s{background:#f3f4f6;color:#374151;font-size:13px;padding:7px 14px}
.btn-s:hover{background:#e5e7eb}
.mb3{margin-bottom:12px}.mb4{margin-bottom:16px}
.xs{font-size:11px}.sm{font-size:12px}.bold{font-weight:600}
.tr{color:#dc2626}.tg{color:#059669}.tx{color:#6b7280}
.img-full{max-width:100%;max-height:400px;border-radius:12px}
.result-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
.item{border:1px solid #e5e7eb;border-radius:12px;overflow:hidden}
.item img{width:100%;display:block}
.item-a{padding:8px;text-align:center}
.s-b{background:#eff6ff;border:1px solid #bfdbfe;border-radius:12px;padding:14px;margin-bottom:12px}
.s-g{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:12px;padding:14px;margin-bottom:12px}
.s-tag{display:inline-block;background:#fff;border:1px solid #d1d5db;color:#374151;padding:2px 10px;border-radius:999px;font-size:11px;margin:2px}
.load{text-align:center;padding:40px}
.load-e{font-size:48px;margin-bottom:12px}
.load-t{color:#6b7280}
.err{text-align:center;padding:30px;color:#dc2626}
.foot{text-align:center;font-size:12px;color:#d1d5db;padding:24px 0;border-top:1px solid #f3f4f6;margin-top:40px}
.admin-card{border-radius:16px;padding:40px;max-width:440px;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.1)}
.ft{font-size:20px;margin-bottom:8px}
.fp{color:#6b7280;font-size:13px;margin-bottom:24px}
.fi{width:100%;text-align:center;font-size:20px;letter-spacing:4px;padding:12px;border:2px solid #e5e7eb;border-radius:10px;outline:none;margin-bottom:12px}
.fi:focus{border-color:#2563eb}
.fer{color:#dc2626;font-size:13px;margin-bottom:12px}
.saved{background:#f0fdf4;border:1px solid #bbf7d0;color:#166534;border-radius:8px;padding:10px 16px;font-size:13px;margin-bottom:16px;display:none}
.saved.on{display:block}
.cfg-grid{display:grid;gap:16px}
.cfg-field label{display:block;font-size:13px;font-weight:600;margin-bottom:4px}
.cfg-hint{font-size:11px;color:#9ca3af;margin-top:3px}
.info-box{background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:14px;margin-bottom:20px;font-size:12px;color:#92400e}
.mt-2{margin-top:8px}.mt-4{margin-top:16px}
</style>
</head>
<body>
<div id="app"></div>
<script>

var API='';
var $=function(s){return document.querySelector(s)};
var S={sec:'scene'};

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function copyT(t){navigator.clipboard.writeText(t)}
function go(s){S.sec=s;render()}
function goAdmin(){S.page='admin';S.verified=false;renderA()}

function doU(file,cb,err){
  var f=new FormData();f.append('file',file);
  fetch(API+'/api/upload',{method:'POST',body:f}).then(function(r){return r.json()}).then(function(j){
    if(j.code!==0){if(err)err(j.message);return}
    cb(j.data);
  }).catch(function(e){if(err)err(e.message)});
}

function poll(id,fn){
  if(!id)return;
  function g(){
    fetch(API+'/api/task/'+id).then(function(r){return r.json()}).then(function(j){
      fn(j.data);
      if(j.data&&j.data.status==='processing')setTimeout(g,2500);
    }).catch(function(){setTimeout(g,4000)});
  }
  g();
}

function uz(k,sec){
  var s=S[sec]||(S[sec]={});
  var v=s[k];
  if(v&&v.url)return'<div class="zone succ" id="z'+k+sec+'"><span class="xs tg bold">&#10003; 已上传</span><img src="'+v.url+'" style="max-height:70px;border-radius:6px;margin-top:4px"/><button class="btn-s" style="font-size:11px;margin-top:4px" onclick="clU(\''+k+'\',\''+sec+'\')">更换</button></div>';
  return'<div class="zone" id="z'+k+sec+'" onclick="document.getElementById(\'fi'+k+sec+'\').click()"><div style="font-size:20px">&#128230;</div><div class="xs tx">点击上传<div>最大10MB</div></div></div><input type="file" id="fi'+k+sec+'" accept="image/jpeg,image/png" style="display:none" onchange="hU(event,\''+k+'\',\''+sec+'\')"/>';
}

function clU(k,s){if(S[s])S[s][k]=null;render()}
function hU(e,k,s){
  var f=e.target.files[0];if(!f)return;
  if(!S[s])S[s]={};
  doU(f,function(d){S[s][k]=d;render()},function(m){alert(m)});
}

function R(n,opts,val,sec){
  var m={sSz:'Sz',sSt:'St',vDu:'Du',mTm:'Tm',mSz2:'MSz',mCn:'Cn',eSc:'Sc',cSz:'cSz',sM:'sM',aUn:'aUn'};
  var k=m[n]||n;
  return'<div class="rg">'+opts.map(function(o){return'<span class="rb '+(val===o.v?'on':'')+'" onclick="sv(\''+n+'\',\''+o.v+'\',\''+sec+'\')">'+o.l+'</span>'}).join('')+'</div>';
}

function sv(n,v,sec){
  var m={sSz:'Sz',sSt:'St',vDu:'Du',mTm:'Tm',mSz2:'MSz',mCn:'Cn',eSc:'Sc',cSz:'cSz',sM:'sM',aUn:'aUn'};
  var k=m[n]||n;
  if(S[sec])S[sec][k]=v;render();
}

function ts(t,rst){
  if(!t)return'<div class="load"><div class="load-e">&#9203;</div><div class="load-t">AI 生成中，请稍候...</div></div>';
  if(t.status==='failed')return'<div class="err">&#10060; '+esc(t.error||'未知错误')+'<br><button class="btn-s mt-2" onclick="'+rst+'()">重新生成</button></div>';
  if(t.status==='completed'){
    var u=[];
    try{u=t.result_url?JSON.parse(t.result_url):[t.result_url]}catch(e){u=[t.result_url]};
    u=u.filter(Boolean);
    if(u.length===1)return'<img src="'+u[0]+'" class="img-full"/><div class="flex mt-4"><a href="'+u[0]+'" download class="btn btn-p" style="width:auto">&#128229; 下载</a><button class="btn-s" onclick="'+rst+'()">&#128257; 重新生成</button></div>';
    return'<div class="result-grid">'+u.map(function(x){return'<div class="item"><img src="'+x+'"/><div class="item-a"><a href="'+x+'" download class="btn-s" style="font-size:11px;padding:5px 10px">&#128229;</a></div></div>'}).join('')+'</div><button class="btn-s mt-4" onclick="'+rst+'()">&#128257; 重新生成</button>';
  }
  return'<div class="load"><div class="load-e">&#9203;</div><div class="load-t">AI 生成中（30-60秒）...</div></div>';
}

function sH(r){
  if(!r)return'';
  var h='';
  if(r.keywords)h+='<div class="s-b mb3"><div class="bold sm mb2">&#128476; 关键词（'+r.keywords.length+'个）</div><div style="margin-bottom:8px">'+r.keywords.map(function(k){return'<span class="s-tag">'+esc(k)+'</span>'}).join('')+'</div><button class="btn-s sm" onclick="copyT(\''+r.keywords.join(',').replace(/'/g,"\\'")+'\')">&#128203; 复制全部</button></div>';
  if(r.title)h+='<div class="s-g mb3"><div class="bold sm mb2">&#128221; 标题（'+r.title.length+'/140）</div><div style="background:#fff;border:1px solid #bbf7d0;border-radius:8px;padding:10px;font-size:13px;margin:8px 0">'+esc(r.title)+'</div><button class="btn-s sm" onclick="copyT(\''+esc(r.title).replace(/'/g,"\\'")+'\')">&#128203; 复制</button></div>';
  if(r.description)h+='<div style="background:#faf5ff;border:1px solid #e9d5ff;border-radius:12px;padding:14px;margin-bottom:12px;font-size:13px">'+esc(r.description)+'<br><button class="btn-s sm mt-2" onclick="copyT(this.parentElement.textContent.replace(\'复制\',\'\'))">&#128203; 复制</button></div>';
  if(r.tags)h+='<div style="background:#fff7ed;border:1px solid #fed7aa;border-radius:12px;padding:14px;margin-bottom:12px"><div class="bold sm mb2">Tags（'+r.tags.length+'个）</div><div style="margin-bottom:8px">'+r.tags.map(function(t){return'<span class="s-tag">'+esc(t)+'</span>'}).join('')+'</div><button class="btn-s sm" onclick="copyT(\''+r.tags.join(',').replace(/'/g,"\\'")+'\')">&#128203; 复制全部</button></div>';
  return h;
}

var SECS=[
  {id:'scene',i:'&#128247;',t:'主生成器'},
  {id:'video',i:'&#127916;',t:'视频创作'},
  {id:'model',i:'&#128104;',t:'模特场景'},
  {id:'enhance',i:'&#128269;',t:'质感增强'},
  {id:'annotate',i:'&#128337;',t:'尺寸标注'},
  {id:'compose',i:'&#129514;',t:'创意合成'},
  {id:'seo',i:'&#128269;',t:'SEO工具'}
];

function render(){
  var nb=SECS.map(function(m){return'<button class="nbtn '+(S.sec===m.id?'on':'off')+'" onclick="go(\''+m.id+'\')">'+m.i+' '+m.t+'</button>'}).join('');
  var sd=SECS.map(function(m){return'<div class="sec '+(S.sec===m.id?'on':'')+'" id="s-'+m.id+'"></div>'}).join('');
  $('app').innerHTML='<header><div class="max-w" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px"><div style="display:flex;align-items:center;gap:10px"><span style="font-size:28px">&#10024;</span><div><div style="font-size:18px;font-weight:700">Etsy688 Local</div><div style="font-size:11px;color:#9ca3af">内部 AI 创作工具</div></div></div><nav class="nav">'+nb+'<button class="nbtn r" onclick="goAdmin()">&#9881;</button></nav></div></header><main class="max-w" style="padding:24px 16px">'+sd+'</main><div class="foot">Etsy688 Local · 内部工具</div>';
  rScene();rVideo();rModel();rEnhance();rAnnotate();rCompose();rSeo();
}

function rScene(){var el=$('#s-scene');if(!el)return;var s=S.scene||(S.scene={});el.innerHTML='<div class="card"><div style="font-size:16px;font-weight:700;margin-bottom:4px">&#128247; 主生成器</div><div style="font-size:12px;color:#6b7280;margin-bottom:16px">上传产品图，生成商业场景图</div><div class="ugrid mb4"><div><span class="lbl" style="color:#dc2626">正面图 *</span>'+uz('f','scene')+'</div><div><span class="lbl">侧面图</span>'+uz('sd','scene')+'</div><div><span class="lbl">细节图</span>'+uz('dt','scene')+'</div></div><div class="mb3"><span class="lbl">尺寸</span>'+R('sSz',[{l:'1:1',v:'1:1'},{l:'3:4',v:'3:4'},{l:'4:3',v:'4:3'},{l:'9:16',v:'9:16'},{l:'5:4',v:'5:4'}],s.Sz||'1:1','scene')+'</div><div class="mb3"><span class="lbl">风格</span>'+R('sSt',[{l:'智能',v:'smart'},{l:'真人',v:'realistic_model'},{l:'家居',v:'home'},{l:'Pinterest',v:'pinterest'},{l:'Ins',v:'instagram'},{l:'自定义',v:'custom'}],s.St||'smart','scene')+'</div>'+(s.St==='custom'?'<textarea class="ta mb3" id="sC" placeholder="描述（英文）">'+(s.pc||'')+'</textarea>':'')+'<button class="btn btn-p" id="sBtn" '+(s.f&&s.f.url?'':'disabled')+' onclick="subS()">&#9654; 开始生成场景图</button></div>'+(s.tid&&s.t?'<div class="card" id="sR">'+ts(s.t,'reS')+'</div>':'');var sc=$('#sC');if(sc)sc.oninput=function(e){s.pc=e.target.value};var b=$('#sBtn');if(b)b.onclick=subS;if(s.tid)poll(s.tid,function(t){s.t=t;var r=$('#sR');if(r)r.innerHTML=ts(t,'reS');else el.innerHTML+='<div class="card" id="sR">'+ts(t,'reS')+'</div>'})}
function subS(){var s=S.scene||(S.scene={});if(!s.f||!s.f.url){alert('请上传正面图');return}var b=$('#sBtn');if(b){b.disabled=true;b.textContent='...'}fetch(API+'/api/generate/scene',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({images:[s.f.url],size_ratio:s.Sz||'1:1',style:s.St||'smart',custom_prompt:s.pc||''})}).then(function(r){return r.json()}).then(function(j){if(j.code!==0){alert(j.message);var b2=$('#sBtn');if(b2){b2.disabled=false;b2.textContent='开始'};return}s.tid=j.data.task_id;s.t=null;render()}).catch(function(e){alert(e.message);var b2=$('#sBtn');if(b2){b2.disabled=false;b2.textContent='开始'}})}
function reS(){var s=S.scene||(S.scene={});s.tid=null;s.t=null;render()}
function rVideo(){var el=$('#s-video');if(!el)return;var s=S.video||(S.video={});el.innerHTML='<div class="card"><div style="font-size:16px;font-weight:700;margin-bottom:4px">&#127916; 视频创作</div><div style="font-size:12px;color:#6b7280;margin-bottom:16px">AI 生成动态展示视频</div><div class="mb4"><span class="lbl">产品图</span>'+uz('img','video')+'</div><textarea class="ta mb3" id="vP" placeholder="描述效果">'+(s.pc||'')+'</textarea><div class="mb4"><span class="lbl">时长</span>'+R('vDu',[{l:'5秒',v:'5'},{l:'10秒',v:'10'}],s.Du||'10','video')+'</div><button class="btn btn-p" id="vBtn" '+(s.img&&s.img.url?'':'disabled')+' onclick="subV()">&#9654; 立即生成</button></div>'+(s.tid&&s.t?'<div class="card">'+(s.t.result_url?'<video src="'+s.t.result_url+'" controls style="width:100%;border-radius:12px"></video><div class="flex mt-4"><a href="'+s.t.result_url+'" download class="btn btn-p" style="width:auto">&#128229; 下载MP4</a><button class="btn-s" onclick="reV()">重新</button></div>':ts(s.t,'reV'))+'</div>':'');var vp=$('#vP');if(vp)vp.oninput=function(e){s.pc=e.target.value};var b=$('#vBtn');if(b)b.onclick=subV;if(s.tid)poll(s.tid,function(t){s.t=t;render()})}
function subV(){var s=S.video||(S.video={});if(!s.img||!s.img.url){alert('请上传产品图');return}fetch(API+'/api/generate/video',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({image_url:s.img.url,prompt:s.pc||'',duration:s.Du||'10'})}).then(function(r){return r.json()}).then(function(j){if(j.code!==0){alert(j.message);return}s.tid=j.data.task_id;s.t=null;render()}).catch(function(e){alert(e.message)})}
function reV(){var s=S.video||(S.video={});s.tid=null;s.t=null;render()}
function rModel(){var el=$('#s-model');if(!el)return;var s=S.model||(S.model={});var TM=[{l:'户外',v:'outdoor'},{l:'咖啡馆',v:'cafe'},{l:'卧室',v:'bedroom'},{l:'街拍',v:'street'},{l:'影棚',v:'studio'},{l:'自定义',v:'custom'}];el.innerHTML='<div class="card"><div style="font-size:16px;font-weight:700;margin-bottom:4px">&#128104; 模特场景</div><div style="font-size:12px;color:#6b7280;margin-bottom:16px">AI 生成模特穿戴展示图</div><div class="mb4"><span class="lbl">产品白底图</span>'+uz('img','model')+'</div><div class="mb3"><span class="lbl">模板</span>'+R('mTm',TM,s.Tm||'studio','model')+'</div>'+(s.Tm==='custom'?'<textarea class="ta mb3" id="mC" placeholder="场景描述（英文）">'+(s.dc||'')+'</textarea>':'')+'<div class="mb3"><span class="lbl">尺寸</span>'+R('mSz2',[{l:'1:1',v:'1:1'},{l:'3:4',v:'3:4'},{l:'4:3',v:'4:3'},{l:'9:16',v:'9:16'}],s.MSz||'3:4','model')+'</div><div class="mb4"><span class="lbl">数量</span>'+R('mCn',[{l:'1',v:'1'},{l:'2',v:'2'},{l:'4',v:'4'}],s.Cn||'1','model')+'</div><button class="btn btn-p" '+(s.img&&s.img.url?'':'disabled')+' onclick="subM()">&#9654; 开始</button></div>'+(s.tid&&s.t?'<div class="card">'+ts(s.t,'reM')+'</div>':'');var mc=$('#mC');if(mc)mc.oninput=function(e){s.dc=e.target.value};if(s.tid)poll(s.tid,function(t){s.t=t;render()})}
function subM(){var s=S.model||(S.model={});if(!s.img||!s.img.url){alert('请上传白底图');return}fetch(API+'/api/generate/model',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({image_url:s.img.url,scene_prompt:s.dc||'',style:s.Tm||'studio',count:parseInt(s.Cn||'1'),output_ratio:s.MSz||'3:4'})}).then(function(r){return r.json()}).then(function(j){if(j.code!==0){alert(j.message);return}s.tid=j.data.task_id;s.t=null;render()}).catch(function(e){alert(e.message)})}
function reM(){var s=S.model||(S.model={});s.tid=null;s.t=null;render()}
function rEnhance(){var el=$('#s-enhance');if(!el)return;var s=S.enhance||(S.enhance={});el.innerHTML='<div class="card"><div style="font-size:16px;font-weight:700;margin-bottom:4px">&#128269; 质感增强</div><div style="font-size:12px;color:#6b7280;margin-bottom:16px">AI 超分辨率重建清晰度</div><div class="mb4"><span class="lbl">原图</span>'+uz('img','enhance')+'</div><div class="mb4"><span class="lbl">倍数</span>'+R('eSc',[{l:'2x',v:'2'},{l:'4x',v:'4'}],s.Sc||'2','enhance')+'</div><button class="btn btn-p" '+(s.img&&s.img.url?'':'disabled')+' onclick="subE()">&#9654; 生成</button></div>'+(s.tid&&s.t?'<div class="card"><div style="font-size:14px;font-weight:700;margin-bottom:8px">&#10024; 增强完成</div>'+(s.t.result_url&&s.img?'<div class="ugrid mb4"><div><div class="xs tx">原图</div><img src="'+s.img.url+'" style="width:100%;border-radius:8px;border:1px solid #e5e7eb"/></div><div><div class="xs tg">增强后</div><img src="'+s.t.result_url+'" style="width:100%;border-radius:8px;border:1px solid #bbf7d0"/></div></div><div class="flex"><a href="'+s.t.result_url+'" download class="btn btn-p" style="width:auto">&#128229; 下载</a><button class="btn-s" onclick="reE()">重新</button></div>':ts(s.t,'reE'))+'</div>':'');if(s.tid)poll(s.tid,function(t){s.t=t;render()})}
function subE(){var s=S.enhance||(S.enhance={});if(!s.img||!s.img.url){alert('请上传图片');return}fetch(API+'/api/enhance/detail',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({image_url:s.img.url,scale:parseInt(s.Sc||'2')})}).then(function(r){return r.json()}).then(function(j){if(j.code!==0){alert(j.message);return}s.tid=j.data.task_id;s.t=null;render()}).catch(function(e){alert(e.message)})}
